<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study | LV-ZHU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        .knowledge-map {
            position: relative;
            margin-top: 1.35rem;
            padding: 3rem 1.5rem;
            border-radius: 22px;
            border: 1px solid #e2e8f0;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            box-shadow: 0 20px 36px -8px rgba(15, 23, 42, 0.05);
            overflow-x: auto;
            overflow-y: hidden;
        }

        .knowledge-map::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.8;
            pointer-events: none;
        }

        .km-board {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: repeat(14, minmax(0, 1fr));
            gap: 1.5rem 0.5rem;
            align-items: center;
            min-height: 800px;
            min-width: 1000px;
        }

        .km-node {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 56px;
            padding: 0.6rem 1rem;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            color: #334155;
            font-size: 0.94rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .km-node:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            border-color: #cbd5e1;
            z-index: 10;
        }

        .km-node-408 {
            background: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 100%);
            color: #0369a1 !important;
            border: 1px solid #bae6fd;
            box-shadow: 0 4px 10px -2px rgba(14, 165, 233, 0.15);
        }

        .km-node-408:hover {
            box-shadow: 0 12px 20px -4px rgba(14, 165, 233, 0.25);
            border-color: #7dd3fc;
        }

        .km-badge {
            background: #bae6fd;
            color: #0284c7;
            padding: 0.15rem 0.4rem;
            border-radius: 6px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
            font-weight: 700;
        }

        /* Responsive Flow (14 columns) */
        .n-math    { grid-column: 5 / 7; grid-row: 1; }
        .n-linear  { grid-column: 9 / 11; grid-row: 1; }
        .n-jiqin   { grid-column: 13 / 15; grid-row: 1; }

        .n-physics { grid-column: 2 / 4; grid-row: 2; }
        .n-discrete{ grid-column: 6 / 8; grid-row: 2; }
        .n-circuit { grid-column: 11 / 13; grid-row: 2; }

        .n-program { grid-column: 3 / 5; grid-row: 3; }
        .n-crypto  { grid-column: 8 / 10; grid-row: 3; }
        .n-assembly{ grid-column: 12 / 14; grid-row: 3; }

        .n-ds      { grid-column: 4 / 6; grid-row: 4; }
        .n-logic   { grid-column: 10 / 12; grid-row: 4; }

        .n-db      { grid-column: 2 / 4; grid-row: 5; }
        .n-co      { grid-column: 11 / 13; grid-row: 5; }

        .n-os      { grid-column: 7 / 9; grid-row: 6; }
        .n-net     { grid-column: 11 / 13; grid-row: 6; }

        .km-lines {
            position: absolute;
            z-index: 1;
            inset: 0;
            pointer-events: none;
        }

        .km-lines path {
            fill: none;
            stroke: #94a3b8;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: kmPathIn 600ms ease both;
        }

        .km-lines .strong {
            stroke: #64748b;
            stroke-width: 2.5;
        }

        .km-lines .soft {
            stroke: #cbd5e1;
            stroke-dasharray: 6 6;
            stroke-width: 1.5;
        }

        @keyframes kmPathIn {
            from { opacity: 0; stroke-dashoffset: 1000; stroke-dasharray: 1000; }
            to { opacity: 1; stroke-dashoffset: 0; }
        }

        @media (max-width: 1024px) {
            .km-board {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                min-height: auto;
            }

            .km-lines {
                display: none;
            }

            .n-math,
            .n-linear,
            .n-physics,
            .n-circuit,
            .n-program,
            .n-discrete,
            .n-assembly,
            .n-logic,
            .n-ds,
            .n-co,
            .n-os,
            .n-net,
            .n-db,
            .n-crypto,
            .n-jiqin {
                grid-column: auto;
                grid-row: auto;
            }

            .km-node {
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar"></nav>

    <div class="page-wrapper">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1><i class="fas fa-book"></i> Study</h1>
        </div>

        <!-- 学习分类部分 -->
        <section class="section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">学习分区</h2>
                </div>

                <div class="knowledge-map fade-in">
                    <svg id="km-lines" class="km-lines"></svg>

                    <div class="km-board" id="km-board">
                        <a id="n-math" class="km-node n-math" href="math-analysis/index.html">数分高数</a>
                        <a id="n-linear" class="km-node n-linear" href="linear-algebra/index.html">高代线代</a>

                        <a id="n-physics" class="km-node n-physics" href="physics/index.html">大学物理</a>
                        <a id="n-discrete" class="km-node n-discrete" href="discrete-math/index.html">离散数学</a>
                        <a id="n-circuit" class="km-node n-circuit" href="circuit-theory/index.html">电路理论</a>

                        <a id="n-program" class="km-node n-program" href="../projects/cpp-bighw/index.html">程序设计</a>
                        <a id="n-logic" class="km-node n-logic" href="../projects/fpga/index.html">数字逻辑</a>
                        <a id="n-assembly" class="km-node n-assembly" href="assembly_language_programming/index.html">汇编语言</a>

                        <a id="n-ds" class="km-node km-node-408 n-ds" href="408/data-structure/index.html">数据结构<span class="km-badge">408</span></a>
                        <a id="n-co" class="km-node km-node-408 n-co" href="408/computer-organization/index.html">计算机组成原理<span class="km-badge">408</span></a>

                        <a id="n-os" class="km-node km-node-408 n-os" href="408/os/index.html">操作系统<span class="km-badge">408</span></a>
                        <a id="n-net" class="km-node km-node-408 n-net" href="408/computer-network/index.html">计算机网络<span class="km-badge">408</span></a>

                        <a id="n-db" class="km-node n-db" href="database/index.html">数据库</a>
                        <a id="n-crypto" class="km-node n-crypto" href="cryptography/index.html">密码学</a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 页脚 -->
    <footer class="footer"></footer>
    <script src="../../js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const board = document.getElementById('km-board');
            const svg = document.getElementById('km-lines');
            const container = document.querySelector('.knowledge-map');
            if (!board || !svg || !container) return;

            const relations = [
                ['n-math', 'n-physics', 'soft'],
                ['n-math', 'n-discrete', 'soft'],
                ['n-math', 'n-circuit', 'soft'],
                ['n-linear', 'n-crypto', 'soft'],
                ['n-linear', 'n-circuit', 'soft'],
                ['n-discrete', 'n-crypto', 'soft'],
                ['n-discrete', 'n-ds', 'strong'],
                ['n-program', 'n-ds', 'strong'],
                ['n-program', 'n-db', 'soft'],
                ['n-ds', 'n-db', 'strong'],
                ['n-logic', 'n-co', 'strong'],
                ['n-assembly', 'n-co', 'strong'],
                ['n-ds', 'n-os', 'strong'],
                ['n-co', 'n-os', 'strong'],
                ['n-co', 'n-net', 'strong']
            ];

            const ns = 'http://www.w3.org/2000/svg';

            function nodeInfo(id) {
                const el = document.getElementById(id);
                if (!el) return;
                const rect = el.getBoundingClientRect();
                const base = svg.getBoundingClientRect();
                return {
                    x: rect.left - base.left + rect.width / 2,
                    y: rect.top - base.top + rect.height / 2,
                    left: rect.left - base.left,
                    right: rect.left - base.left + rect.width,
                    top: rect.top - base.top,
                    bottom: rect.top - base.top + rect.height,
                    width: rect.width,
                    height: rect.height
                };
            }

            function anchorPoint(source, target) {
                const dx = target.x - source.x;
                const dy = target.y - source.y;
                const horizontalBias = Math.abs(dx) * source.height > Math.abs(dy) * source.width * 1.5;

                if (horizontalBias) {
                    return {
                        x: dx >= 0 ? source.right : source.left,
                        y: source.y
                    };
                }

                return {
                    x: source.x,
                    y: dy >= 0 ? source.bottom : source.top
                };
            }

            function buildPath(a, b) {
                const lift = Math.max(20, Math.min(80, Math.abs(b.y - a.y) * 0.5));
                const cp1x = a.x;
                const cp1y = a.y + (b.y >= a.y ? lift : -lift);
                const cp2x = b.x;
                const cp2y = b.y - (b.y >= a.y ? lift : -lift);
                return 'M ' + a.x + ' ' + a.y + ' C ' + cp1x + ' ' + cp1y + ', ' + cp2x + ' ' + cp2y + ', ' + b.x + ' ' + b.y;
            }

            function draw() {
                const width = container.scrollWidth;
                const height = container.scrollHeight;
                svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
                svg.setAttribute('width', width);
                svg.setAttribute('height', height);
                svg.innerHTML = '';

                // Define markers
                const defs = document.createElementNS(ns, 'defs');
                const marker = document.createElementNS(ns, 'marker');
                marker.setAttribute('id', 'arrow');
                marker.setAttribute('viewBox', '0 0 10 10');
                marker.setAttribute('refX', '8');
                marker.setAttribute('refY', '5');
                marker.setAttribute('markerWidth', '6');
                marker.setAttribute('markerHeight', '6');
                marker.setAttribute('orient', 'auto-start-reverse');
                const path = document.createElementNS(ns, 'path');
                path.setAttribute('d', 'M 0 2 L 8 5 L 0 8 z');
                path.setAttribute('fill', '#94a3b8');
                marker.appendChild(path);
                defs.appendChild(marker);
                svg.appendChild(defs);

                relations.forEach(([from, to, level]) => {
                    const src = nodeInfo(from);
                    const dst = nodeInfo(to);
                    if (!src || !dst) return;

                    const start = anchorPoint(src, dst);
                    const end = anchorPoint(dst, src);

                    const p = document.createElementNS(ns, 'path');
                    p.setAttribute('d', buildPath(start, end));
                    if (level) p.setAttribute('class', level);
                    
                    // Add modern subtle animation to strong paths
                    if (level === 'strong') {
                        p.style.strokeDasharray = '1000';
                        p.style.strokeDashoffset = '1000';
                        p.style.animation = 'kmPathIn 1.2s ease-out forwards';
                    }

                    svg.appendChild(p);
                });
            }

            function debounce(fn, wait) {
                let timer;
                return () => {
                    clearTimeout(timer);
                    timer = setTimeout(fn, wait);
                };
            }

            // Small delay to ensure true layout calculation
            setTimeout(draw, 50);
            window.addEventListener('resize', debounce(draw, 120));
        });
    </script>
</body>
</html>
