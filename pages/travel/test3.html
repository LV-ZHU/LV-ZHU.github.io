<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://registry.npmmirror.com/echarts/5.5.0/files/dist/echarts.min.js"></script>
</head>
<body>
    <div id="main" style="width: 800px;height:600px;"></div>
    <script>
        async function run(){
            const res1 = await fetch('https://registry.npmmirror.com/echarts/4.9.0/files/map/json/china-cities.json');
            const chinaCities = await res1.json();
            const res2 = await fetch('https://registry.npmmirror.com/echarts/4.9.0/files/map/json/china.json');
            const chinaProv = await res2.json();
            
            echarts.registerMap('china-prov', chinaProv); // so Echarts decodes it immediately into its internal cache!
            echarts.registerMap('china-cities', chinaCities);
            
            const decodedProv = echarts.getMap('china-prov').geoJson; 
            
            let provLines = [];
            decodedProv.features.forEach(f => {
                if (f.geometry.type === 'Polygon') {
                    f.geometry.coordinates.forEach(ring => { provLines.push({ coords: ring }); });
                } else if (f.geometry.type === 'MultiPolygon') {
                    f.geometry.coordinates.forEach(poly => {
                        poly.forEach(ring => { provLines.push({ coords: ring }); });
                    });
                }
            });
            console.log("Lines created", provLines.length);
            
            var chart = echarts.init(document.getElementById('main'));
            
            chart.setOption({
                geo: {
                    map: 'china-cities',
                    roam: true
                },
                series: [
                    {
                        type: 'map',
                        map: 'china-cities',
                        geoIndex: 0,
                        data: [{name: '上海市', value: 1}]
                    },
                    {
                        type: 'lines',
                        coordinateSystem: 'geo',
                        data: provLines,
                        polyline: true,
                        silent: true,
                        lineStyle: {
                            color: '#334155',
                            width: 2.2,
                            opacity: 1
                        }
                    }
                ]
            });
        }
        run();
    </script>
</body>
</html>
