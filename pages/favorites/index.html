<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites | LV-ZHU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        .keyboard-shell {
            max-width: 1180px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 2rem;
        }
        .keyboard-head {
            text-align: center;
            margin-bottom: 1.2rem;
        }
        .keyboard-head h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }
        .keyboard-head p {
            color: var(--gray);
            font-size: 0.95rem;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .ctrl-btn {
            border: 1px solid rgba(0,0,0,0.08);
            background: white;
            border-radius: var(--radius-sm);
            color: var(--dark);
            padding: 0.45rem 0.85rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .ctrl-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .ctrl-btn.primary {
            border-color: rgba(79, 70, 229, 0.35);
            color: var(--primary);
        }
        .ctrl-btn.warning {
            border-color: rgba(239, 68, 68, 0.35);
            color: #dc2626;
        }
        .edit-tip {
            text-align: center;
            color: var(--gray);
            font-size: 0.82rem;
            margin-bottom: 1.2rem;
        }
        .keyboard-legend {
            display: flex;
            gap: 0.9rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.6rem;
        }
        .legend-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.82rem;
            border-radius: 999px;
            padding: 0.3rem 0.8rem;
            background: var(--light);
            color: var(--gray);
            border: 1px solid var(--gray-light);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-dot.general { background: var(--primary); }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }
        .key-row {
            display: grid;
            gap: 0.75rem;
            grid-template-columns: repeat(10, minmax(70px, 1fr));
        }
        .key-row.row-mid {
            grid-template-columns: 0.6fr repeat(10, minmax(70px, 1fr)) 0.6fr;
        }
        .key-row.row-bottom {
            grid-template-columns: 1fr repeat(9, minmax(70px, 1fr));
        }
        .key-row.row-arrows {
            grid-template-columns: repeat(10, minmax(70px, 1fr));
            margin-top: 0.4rem;
        }
        .spacer { pointer-events: none; }

        .key {
            min-height: 86px;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: var(--radius-sm);
            background: white;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            padding: 0.65rem 0.5rem;
            user-select: none;
            transition: var(--transition-fast);
            text-align: center;
        }
        .key .k-label {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--dark);
            line-height: 1;
        }
        .key .k-note {
            font-size: 0.75rem;
            color: var(--gray);
            line-height: 1.2;
        }
        .key.linkable {
            cursor: pointer;
            text-decoration: none;
        }
        .key.linkable:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }
        .key.linkable:focus-visible {
            outline: 3px solid rgba(79, 70, 229, 0.25);
            outline-offset: 1px;
        }
        .key .k-label { color: var(--primary); }
        .key.current-key {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }
        .key.current-key.study-key { border-color: var(--primary); }
        .key.editing {
            border-style: dashed;
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.08);
        }

        .tip-line {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--gray);
            font-size: 0.88rem;
        }

        @media (max-width: 1024px) {
            .keyboard-shell { padding: 1.2rem; }
            .key-row,
            .key-row.row-mid,
            .key-row.row-bottom,
            .key-row.row-arrows {
                grid-template-columns: repeat(5, minmax(70px, 1fr));
            }
            .spacer { display: none; }
            .key { min-height: 78px; }
        }

        @media (max-width: 768px) {
            .keyboard-head h2 { font-size: 1.6rem; }
            .key .k-label { font-size: 1.2rem; }
            .key .k-note { font-size: 0.7rem; }
        }
    </style>
</head>

    <footer class="footer"></footer>
    <script src="../../js/common.js"></script>
    <script>
        const STORAGE_KEY = 'lv-zhu-favorites-keymap';
        const defaultConfig = {
            Q: { note: 'QQ群号', href: 'Q/index.html' },
            W: { note: '-', href: 'W/index.html' },
            E: { note: '-', href: 'E/index.html' },
            R: { note: '-', href: 'R/index.html' },
            T: { note: '同济网站', href: 'T/index.html' },
            Y: { note: '有趣网站', href: 'Y/index.html' },
            U: { note: '-', href: 'U/index.html' },
            I: { note: '-', href: 'I/index.html' },
            O: { note: '-', href: 'O/index.html' },
            P: { note: '项目资源', href: 'P/index.html' },
            A: { note: '-', href: 'A/index.html' },
            S: { note: '学习资源', href: 'S/index.html' },
            D: { note: '-', href: 'D/index.html' },
            F: { note: '-', href: 'F/index.html' },
            G: { note: '游戏网站', href: 'G/index.html' },
            H: { note: '-', href: 'H/index.html' },
            J: { note: '-', href: 'J/index.html' },
            K: { note: '-', href: 'K/index.html' },
            L: { note: '-', href: 'L/index.html' },
            Z: { note: '-', href: 'Z/index.html' },
            X: { note: '-', href: 'X/index.html' },
            C: { note: 'CSDN 代表', href: 'C/index.html' },
            V: { note: '-', href: 'V/index.html' },
            B: { note: '学长博客', href: 'B/index.html' },
            N: { note: '-', href: 'N/index.html' },
            M: { note: '-', href: 'M/index.html' }
        };

        function loadConfig() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return { ...defaultConfig };
                return { ...defaultConfig, ...JSON.parse(raw) };
            } catch {
                return { ...defaultConfig };
            }
        }

        function saveConfig(config) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        }

        const config = loadConfig();
        const keys = Array.from(document.querySelectorAll('.key.linkable[data-key]'));
        const hotkeys = {};
        let currentIndex = 0;
        let isEditMode = false;

        function normalizeHref(input, fallback) {
            const val = (input || '').trim();
            if (!val) return fallback;
            return val;
        }

        function applyConfig() {
            keys.forEach((el) => {
                const key = el.dataset.key;
                const item = config[key] || defaultConfig[key];
                const noteEl = el.querySelector('.k-note');
                if (item && noteEl) {
                    noteEl.textContent = item.note || '-';
                    el.setAttribute('href', item.href || defaultConfig[key].href);
                }
                hotkeys[key.toLowerCase()] = el.getAttribute('href');
            });
        }

        function setCurrent(index) {
            keys.forEach(el => el.classList.remove('current-key'));
            if (!keys.length) return;
            currentIndex = (index + keys.length) % keys.length;
            keys[currentIndex].classList.add('current-key');
        }

        function setEditMode(on) {
            isEditMode = on;
            document.getElementById('toggleEditBtn').textContent = on ? '关闭编辑模式' : '开启编辑模式';
            document.getElementById('editTip').textContent = on
                ? '编辑模式已开启：点击任意字母键，依次输入新标题与新地址（可填站内相对路径或完整网址）。'
                : '编辑模式关闭。开启后可点击任意字母键自定义标题和跳转地址。';
            keys.forEach(el => el.classList.toggle('editing', on));
        }

        document.getElementById('toggleEditBtn').addEventListener('click', () => {
            setEditMode(!isEditMode);
        });

        document.getElementById('resetConfigBtn').addEventListener('click', () => {
            if (!window.confirm('确认重置所有键位配置为默认值吗？')) return;
            localStorage.removeItem(STORAGE_KEY);
            Object.keys(config).forEach(k => delete config[k]);
            Object.assign(config, defaultConfig);
            applyConfig();
            setCurrent(0);
        });

        keys.forEach((el) => {
            el.addEventListener('click', (event) => {
                if (!isEditMode) return;
                event.preventDefault();
                const key = el.dataset.key;
                const current = config[key] || defaultConfig[key];
                const note = window.prompt('输入 ' + key + ' 键显示标题：', current.note || '-');
                if (note === null) return;
                const href = window.prompt('输入 ' + key + ' 键跳转地址：', current.href || defaultConfig[key].href);
                if (href === null) return;
                config[key] = {
                    note: note.trim() || '-',
                    href: normalizeHref(href, defaultConfig[key].href)
                };
                saveConfig(config);
                applyConfig();
            });
        });

        function buildRowLayout() {
            const rows = [];
            const itemMap = keys.map((el, idx) => {
                const rect = el.getBoundingClientRect();
                return {
                    idx,
                    top: rect.top,
                    centerX: rect.left + rect.width / 2,
                    el
                };
            });

            const tolerance = 14;
            itemMap.forEach((item) => {
                let targetRow = rows.find(r => Math.abs(r.top - item.top) <= tolerance);
                if (!targetRow) {
                    targetRow = { top: item.top, items: [] };
                    rows.push(targetRow);
                }
                targetRow.items.push(item);
            });

            rows.sort((a, b) => a.top - b.top);
            rows.forEach((row) => row.items.sort((a, b) => a.centerX - b.centerX));
            return rows;
        }

        function moveVertical(direction) {
            const rows = buildRowLayout();
            const currentEl = keys[currentIndex];
            const currentRect = currentEl.getBoundingClientRect();
            const currentX = currentRect.left + currentRect.width / 2;

            let currentRowIndex = -1;
            for (let i = 0; i < rows.length; i += 1) {
                if (rows[i].items.some(item => item.el === currentEl)) {
                    currentRowIndex = i;
                    break;
                }
            }
            if (currentRowIndex < 0) return;

            const targetRowIndex = direction === 'up' ? currentRowIndex - 1 : currentRowIndex + 1;
            if (targetRowIndex < 0 || targetRowIndex >= rows.length) return;

            const targetRow = rows[targetRowIndex].items;
            let best = targetRow[0];
            let bestDx = Math.abs(best.centerX - currentX);
            for (let i = 1; i < targetRow.length; i += 1) {
                const dx = Math.abs(targetRow[i].centerX - currentX);
                if (dx < bestDx) {
                    best = targetRow[i];
                    bestDx = dx;
                }
            }
            setCurrent(best.idx);
        }

        applyConfig();
        if (keys.length) setCurrent(0);

        document.addEventListener('keydown', (event) => {
            const tag = (event.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea') return;

            const lower = event.key.toLowerCase();
            if (hotkeys[lower] && !isEditMode) {
                window.location.href = hotkeys[lower];
                return;
            }

            if (!keys.length) return;

            if (event.key === 'ArrowRight') {
                event.preventDefault();
                setCurrent(currentIndex + 1);
            } else if (event.key === 'ArrowLeft') {
                event.preventDefault();
                setCurrent(currentIndex - 1);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                moveVertical('up');
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                moveVertical('down');
            } else if (event.key === 'Enter' && !isEditMode) {
                event.preventDefault();
                keys[currentIndex].click();
            }
        });
    </script>
</body>
