<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Minimal Profile</title>
    <!-- 引入字体和图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* 容器：核心视觉区域 */
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            padding: 4rem 3rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        /* 顶部装饰（低调的视觉亮点） */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
        }

        /* 头像区域（极简处理） */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 2rem;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #f0f0f0;
        }

        .avatar i {
            font-size: 48px;
            color: #888;
        }

        /* 核心信息区（克制且简洁） */
        .profile-info {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .profile-info h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .profile-info p {
            font-size: 1rem;
            color: #718096;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
        }

        /* 链接区（极简，仅保留必要入口） */
        .links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #f5f5f5;
            color: #4a5568;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .links a:hover {
            background-color: #6366f1;
            color: white;
            transform: scale(1.05);
        }

        /* 项目展示区（低调展示，不张扬） */
        .projects {
            margin-top: 3rem;
            text-align: center;
        }

        .projects h2 {
            font-size: 1.25rem;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 1.5rem;
        }

        .project-card {
            display: inline-block;
            padding: 1rem 2rem;
            margin: 0 0.5rem;
            background-color: #f9f9f9;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #666;
            border: 1px solid #eee;
            transition: all 0.2s ease;
        }

        .project-card:hover {
            background-color: #f0f0f0;
        }

        /* 页脚（极简） */
        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.875rem;
            color: #a0aec0;
        }

        /* 响应式适配 */
        @media (max-width: 600px) {
            .container {
                padding: 2.5rem 1.5rem;
            }

            .profile-info h1 {
                font-size: 1.75rem;
            }

            .links {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头像（用图标替代真实头像，保护隐私） -->
        <div class="avatar">
            <i class="fas fa-user"></i>
        </div>

        <!-- 核心信息（仅展示昵称和简短描述） -->
        <div class="profile-info">
            <h1>Developer</h1>
            <p>专注于简洁、高效的代码实现，喜欢探索技术的边界，保持学习的节奏。</p>
        </div>

        <!-- 关键链接（仅保留GitHub，可按需添加） -->
        <div class="links">
            <a href="https://github.com/你的用户名" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
            <!-- 如需添加其他链接，参考以下格式（克制添加）
            <a href="#" target="_blank" title="Email"><i class="fas fa-envelope"></i></a>
            <a href="#" target="_blank" title="Blog"><i class="fas fa-blog"></i></a>
            -->
        </div>

        <!-- 项目展示（低调展示1-2个即可） -->
        <div class="projects">
            <h2>Recent Works</h2>
            <div class="project-card">Minimal Tools <i class="fas fa-external-link-alt fa-xs"></i></div>
        </div>

        <!-- 页脚 -->
        <footer>
            © 2025 · Built with simplicity
        </footer>
    </div>

    <!-- 极简脚本：仅添加基础交互，无多余功能 -->
    <script>
        // 可选：添加页面加载动画（低调）
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 0.5s ease';
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
