<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation | LV-ZHU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .anime-card {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition-normal);
        }
        .anime-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }
        .anime-poster {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.5);
            font-size: 3rem;
            overflow: hidden;
        }
        .anime-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .anime-info {
            padding: 1.2rem;
        }
        .anime-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--dark);
            margin-bottom: 0.3rem;
        }
        .anime-meta {
            font-size: 0.82rem;
            color: var(--gray);
        }
        .anime-rating {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            color: #f59e0b;
            font-weight: 600;
            font-size: 0.88rem;
            margin-top: 0.4rem;
        }
    </style>
</head>
<body>
    <nav class="navbar"></nav>

    <div class="page-wrapper">
        <div class="page-header">
            <h1><i class="fas fa-film"></i> Animation</h1>
            <p>二次元民工漫这一块</p>
        </div>
        <section class="section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">动漫收藏</h2>
                    <p class="section-desc">仅示例</p>
                </div>
                <div class="anime-grid fade-in">
                    <!-- 你的名字 -->
                    <div class="anime-card">
                        <div class="anime-poster">
                            <i class="fas fa-image"></i>
                        </div>
                        <div class="anime-info">
                            <div class="anime-title">你的名字</div>
                            <div class="anime-meta">2016 年 新海诚</div>
                            <div class="anime-rating"><i class="fas fa-star"></i> 9.1</div>
                        </div>
                    </div>

                    </div>
            </div>
        </section>
    </div>

    <footer class="footer"></footer>
    <script src="../../js/common.js"></script>
</body>
</html>
