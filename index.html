<body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA redirect hack — map old static URLs to React routes
      (function() {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          // Remove /pages/ prefix and /index.html suffix from old URLs
          decoded = decoded.replace(/^\/pages\//, '/').replace(/\/index\.html$/, '').replace(/\.html$/, '');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })();
    </script>
