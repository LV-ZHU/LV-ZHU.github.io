<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号 | LV-ZHU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        .account-card {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .account-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            margin-bottom: 1rem;
        }
        .account-avatar-icon {
            font-size: 5rem;
            color: #ccc;
            margin-bottom: 1rem;
        }
        .account-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.3rem;
        }
        .account-email {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 0.3rem;
        }
        .account-provider {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--gray);
            background: #f1f5f9;
            padding: 0.25rem 0.8rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }
        .account-section {
            border-top: 1px solid var(--gray-light);
            padding-top: 1.5rem;
            margin-top: 0.5rem;
        }
        .account-section-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 1rem;
            text-align: left;
        }
        .nickname-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .nickname-input {
            flex: 1;
            border: 1px solid var(--gray-light);
            border-radius: 8px;
            padding: 0.55rem 0.8rem;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .nickname-input:focus {
            border-color: var(--primary);
        }
        .nickname-save {
            padding: 0.55rem 1.2rem;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .nickname-save:hover { opacity: 0.9; }
        .nickname-save:disabled { opacity: 0.5; cursor: not-allowed; }
        .nickname-hint {
            font-size: 0.8rem;
            color: var(--gray);
            text-align: left;
            margin-top: 0.5rem;
        }
        .account-not-logged {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            padding: 3rem 2rem;
            text-align: center;
        }
        .account-not-logged p {
            color: var(--gray);
            margin-bottom: 1.2rem;
        }
        .account-not-logged a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .account-not-logged a:hover { text-decoration: underline; }
        .save-toast {
            font-size: 0.8rem;
            color: #10b981;
            margin-top: 0.4rem;
            text-align: left;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .save-toast.show { opacity: 1; }
    </style>
</head>
<body>
    <nav class="navbar"></nav>

    <div class="page-wrapper">
        <div class="page-header">
            <h1><i class="fas fa-user-circle"></i> 账号</h1>
        </div>
        <section class="section">
            <div class="container">
                <div id="accountContent" class="fade-in">
                    <div class="account-not-logged">
                        <p>请先登录后查看账号信息</p>
                        <a href="../../index.html">返回首页</a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer"></footer>
    <script src="../../js/common.js"></script>
    <script>
        (function () {
            'use strict';

            var db = null;
            var currentUser = null;

            function escapeHtml(str) {
                var div = document.createElement('div');
                div.appendChild(document.createTextNode(str || ''));
                return div.innerHTML;
            }

            function waitForFirebase(callback, retries) {
                retries = retries || 0;
                if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length) {
                    callback();
                    return;
                }
                if (retries > 50) return;
                setTimeout(function () { waitForFirebase(callback, retries + 1); }, 200);
            }

            function loadFirestore() {
                return new Promise(function (resolve, reject) {
                    if (typeof firebase !== 'undefined' && firebase.firestore) { resolve(); return; }
                    var s = document.createElement('script');
                    s.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
                    s.onload = resolve;
                    s.onerror = reject;
                    document.head.appendChild(s);
                });
            }

            function getProviderIcon(providerId) {
                if (!providerId) return '<i class="fas fa-user"></i> 未知';
                if (providerId.includes('google')) return '<i class="fab fa-google"></i> Google';
                if (providerId.includes('github')) return '<i class="fab fa-github"></i> GitHub';
                return '<i class="fas fa-user"></i> ' + providerId;
            }

            async function renderAccount(user) {
                var container = document.getElementById('accountContent');
                if (!user) {
                    container.innerHTML =
                        '<div class="account-not-logged">' +
                        '  <p>请先登录后查看账号信息</p>' +
                        '  <a href="../../index.html">返回首页</a>' +
                        '</div>';
                    return;
                }

                try { await loadFirestore(); } catch (e) { console.error('Firestore 加载失败:', e); }
                if (firebase.apps.length && firebase.firestore) db = firebase.firestore();

                var photoURL = user.photoURL || '';
                var displayName = user.displayName || user.email || '用户';
                var email = user.email || '未绑定邮箱';
                var provider = (user.providerData && user.providerData[0]) ? user.providerData[0].providerId : '';

                // 从 Firestore 读取昵称
                var nickname = '';
                if (db) {
                    try {
                        var doc = await db.collection('users').doc(user.uid).get();
                        if (doc.exists && doc.data().nickname) {
                            nickname = doc.data().nickname;
                        }
                    } catch (e) { /* ignore */ }
                }

                container.innerHTML =
                    '<div class="account-card">' +
                    (photoURL
                        ? '<img class="account-avatar" src="' + photoURL + '" referrerpolicy="no-referrer" />'
                        : '<i class="fas fa-user-circle account-avatar-icon"></i>') +
                    '  <div class="account-name">' + escapeHtml(displayName) + '</div>' +
                    '  <div class="account-email">' + escapeHtml(email) + '</div>' +
                    '  <div class="account-provider">' + getProviderIcon(provider) + '</div>' +
                    '  <div class="account-section">' +
                    '    <div class="account-section-title">昵称</div>' +
                    '    <div class="nickname-row">' +
                    '      <input id="account-nickname" class="nickname-input" value="' + escapeHtml(nickname) + '" placeholder="设置你的昵称..." maxlength="20" />' +
                    '      <button id="account-save" class="nickname-save">保存</button>' +
                    '    </div>' +
                    '    <div class="nickname-hint">昵称会显示在评论和旅行排行榜中</div>' +
                    '    <div id="saveToast" class="save-toast">已保存</div>' +
                    '  </div>' +
                    '</div>';

                document.getElementById('account-save').addEventListener('click', async function () {
                    var btn = this;
                    var input = document.getElementById('account-nickname');
                    var name = input.value.trim();
                    if (!name || !db) return;

                    btn.disabled = true;
                    btn.textContent = '保存中...';

                    try {
                        await db.collection('users').doc(user.uid).set({
                            nickname: name,
                            photoURL: user.photoURL || '',
                            displayName: user.displayName || user.email || '用户',
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                        btn.textContent = '保存';
                        btn.disabled = false;
                        var toast = document.getElementById('saveToast');
                        toast.classList.add('show');
                        setTimeout(function () { toast.classList.remove('show'); }, 2000);
                    } catch (e) {
                        console.error('保存失败:', e);
                        alert('保存失败，请重试');
                        btn.textContent = '保存';
                        btn.disabled = false;
                    }
                });

                document.getElementById('account-nickname').addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') document.getElementById('account-save').click();
                });
            }

            waitForFirebase(function () {
                firebase.auth().onAuthStateChanged(function (user) {
                    currentUser = user;
                    renderAccount(user);
                });
            });
        })();
    </script>
</body>
</html>
