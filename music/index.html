    <style>
        .music-category { margin-bottom: 2.5rem; }
        .music-category:last-child { margin-bottom: 0; }
        .music-category-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.65rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .music-category-title i { color: var(--primary); }
        .music-category-desc {
            color: var(--gray);
            font-size: 0.92rem;
            margin-bottom: 1.2rem;
        }
        .music-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            list-style: none;
        }
        .music-item {
            background: white;
            border-radius: var(--radius-md);
            padding: 1.05rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition-normal);
        }
        .music-item:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .music-main {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .music-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(79, 70, 229, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .music-icon i { color: var(--primary); font-size: 1.1rem; }
        .music-info { min-width: 0; }
        .music-name {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.95rem;
            line-height: 1.45;
        }
        .music-artist { font-size: 0.82rem; color: var(--gray); margin-top: 0.15rem; }
        .music-actions {
            margin-top: 0.8rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .music-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.78rem;
            padding: 0.28rem 0.52rem;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.08);
            background: #f8fafc;
            color: #334155;
            white-space: nowrap;
        }
        .music-link.primary {
            border-color: rgba(251, 114, 153, 0.35);
            background: #fff1f5;
            color: #be185d;
        }
        .music-summary {
            margin-top: 1rem;
            color: var(--gray);
            font-size: 0.88rem;
        }
    </style>
</head>

                var bilibili = buildUrl('https://search.bilibili.com/all?keyword=', query);
