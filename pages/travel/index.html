<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel | LV-ZHU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        .map-container {
            max-width: 900px; margin: 0 auto; background: white;
            border-radius: var(--radius-md); box-shadow: var(--shadow-md); padding: 2rem;
        }
        .map-legend {
            display: flex; gap: 2rem; margin-bottom: 1.5rem;
            justify-content: center; flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--gray); }
        .legend-dot { width: 14px; height: 14px; border-radius: 3px; }
        .legend-dot.visited { background: var(--primary); }
        .legend-dot.unvisited { background: var(--gray-light); }
        .legend-dot.want { background: var(--secondary); }
        .china-map {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 0.6rem;
        }
        .province {
            padding: 0.7rem 0.5rem; border-radius: var(--radius-sm); text-align: center;
            font-size: 0.85rem; font-weight: 500; cursor: pointer;
            transition: var(--transition-fast); border: 2px solid transparent; user-select: none;
        }
        .province.unvisited { background: var(--gray-light); color: var(--gray); }
        .province.visited { background: rgba(79, 70, 229, 0.15); color: var(--primary); border-color: var(--primary); }
        .province.want { background: rgba(16, 185, 129, 0.12); color: var(--secondary); border-color: var(--secondary); }
        .province:hover { transform: scale(1.05); box-shadow: var(--shadow-sm); }
        .province i { display: block; font-size: 1.1rem; margin-bottom: 0.2rem; }
        .map-stats {
            display: flex; justify-content: center; gap: 3rem; margin-top: 2rem;
            padding-top: 1.5rem; border-top: 1px solid var(--gray-light);
        }
        .stat-item { text-align: center; }
        .stat-num { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.85rem; color: var(--gray); margin-top: 0.2rem; }
        .map-tip { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--gray); }
    </style>
</head>
<body>
    <nav class="navbar"></nav>

    <div class="page-wrapper">
        <div class="page-header">
            <h1><i class="fas fa-map-marked-alt"></i> Travel</h1>
        </div>
        <section class="section">
            <div class="container">
                <div class="map-container fade-in">
                    <div class="section-header">
                        <h2 class="section-title">中国足迹地图</h2>
                        <p class="section-desc">点击省份可切换状态：未去 → 去过 → 想去</p>
                    </div>
                    <div class="map-legend">
                        <div class="legend-item"><span class="legend-dot visited"></span> 去过</div>
                        <div class="legend-item"><span class="legend-dot want"></span> 想去</div>
                        <div class="legend-item"><span class="legend-dot unvisited"></span> 未去</div>
                    </div>
                    <div class="china-map" id="chinaMap"></div>
                    <div class="map-stats">
                        <div class="stat-item">
                            <div class="stat-num" id="visitedCount">0</div>
                            <div class="stat-label">去过</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-num" id="wantCount">0</div>
                            <div class="stat-label">想去</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-num" id="totalCount">34</div>
                            <div class="stat-label">总计</div>
                        </div>
                    </div>
                    <p class="map-tip">💡 点击省份可切换状态，数据保存在浏览器本地</p>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer"></footer>
    <script src="../../js/common.js"></script>
    <script>
        const provinces = [
            '北京','天津','上海','重庆',
            '河北','山西','辽宁','吉林','黑龙江',
            '江苏','浙江','安徽','福建','江西','山东',
            '河南','湖北','湖南','广东','海南',
            '四川','贵州','云南','西藏','陕西',
            '甘肃','青海','内蒙古','广西','宁夏','新疆',
            '香港','澳门','台湾'
        ];
        const states = ['unvisited', 'visited', 'want'];
        const STORAGE_KEY = 'lv-zhu-travel-map';
        function loadData() {
            try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : {}; }
            catch { return {}; }
        }
        function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
        function render() {
            const map = document.getElementById('chinaMap');
            const data = loadData();
            map.innerHTML = '';
            provinces.forEach(name => {
                const state = data[name] || 'unvisited';
                const el = document.createElement('div');
                el.className = 'province ' + state;
                el.textContent = name;
                el.addEventListener('click', () => {
                    const currentIdx = states.indexOf(data[name] || 'unvisited');
                    data[name] = states[(currentIdx + 1) % states.length];
                    saveData(data);
                    render();
                });
                map.appendChild(el);
            });
            const vals = Object.values(data);
            document.getElementById('visitedCount').textContent = vals.filter(v => v === 'visited').length;
            document.getElementById('wantCount').textContent = vals.filter(v => v === 'want').length;
        }
        render();
    </script>
</body>
</html>
