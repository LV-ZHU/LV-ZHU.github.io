<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel | LV-ZHU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../css/common.css">
    <script src="https://cdn.staticfile.net/echarts/5.5.0/echarts.min.js"></script>
    <style>
        .travel-container {
            max-width: 1000px; margin: 0 auto; background: white;
            border-radius: var(--radius-md); box-shadow: var(--shadow-md); padding: 2rem;
        }
        
        .map-tabs {
            display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem;
        }
        .map-tab {
            padding: 0.6rem 1.5rem; border: none; border-radius: 20px;
            background: var(--gray-light); color: var(--gray); font-weight: 600;
            cursor: pointer; transition: var(--transition-fast);
        }
        .map-tab.active {
            background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .map-legend {
            display: flex; gap: 2rem; margin-bottom: 1.5rem;
            justify-content: center; flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--gray); }
        .legend-dot { width: 14px; height: 14px; border-radius: 3px; }
        .legend-dot.visited { background: #4f46e5; box-shadow: 0 0 8px rgba(79, 70, 229, 0.5); }
        .legend-dot.want { background: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
        .legend-dot.unvisited { background: #e2e8f0; border: 1px solid #cbd5e1; }

        .echarts-wrapper {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.7);
        }
        #mapChart {
            width: 100%;
            height: 600px;
        }

        .map-stats {
            display: flex; justify-content: center; gap: 3rem; margin-top: 2rem;
            padding-top: 1.5rem; border-top: 1px solid var(--gray-light);
        }
        .stat-item { text-align: center; }
        .stat-num { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.85rem; color: var(--gray); margin-top: 0.2rem; }
        .map-tip { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--gray); }
        
        #loadingMsg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(4px);
            color: var(--primary); font-size: 1.1rem;
            z-index: 10; font-weight: 600; 
        }
    </style>
</head>
<body>
    <nav class="navbar"></nav>

    <div class="page-wrapper">
        <div class="page-header">
            <h1><i class="fas fa-map-marked-alt"></i> Travel</h1>
        </div>
        <section class="section">
            <div class="container">
                <div class="travel-container fade-in">
                    <div class="section-header">
                        <h2 class="section-title">我的足迹</h2>
                        <p class="section-desc">点击地图行政板块可切换状态：未去 → 去过 → 想去</p>
                    </div>
                    
                    <div class="map-tabs">
                        <button class="map-tab active" data-map="china">中国足迹</button>
                        <button class="map-tab" data-map="world">全球足迹</button>
                    </div>

                    <div class="map-legend">
                        <div class="legend-item"><span class="legend-dot visited"></span> 去过</div>
                        <div class="legend-item"><span class="legend-dot want"></span> 想去</div>
                        <div class="legend-item"><span class="legend-dot unvisited"></span> 未去</div>
                    </div>

                    <div class="echarts-wrapper">
                        <div id="loadingMsg"><i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i> 地图数据加载中...</div>
                        <div id="mapChart"></div>
                    </div>

                    <div class="map-stats">
                        <div class="stat-item">
                            <div class="stat-num" id="visitedCount">0</div>
                            <div class="stat-label">去过</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-num" id="wantCount">0</div>
                            <div class="stat-label">想去</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-num" id="totalCount">34</div>
                            <div class="stat-label">总计板块</div>
                        </div>
                    </div>
                    <p class="map-tip">数据保存在浏览器本地。地图支持滚轮缩放与鼠标拖拽。</p>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer"></footer>
    <script src="../../js/common.js"></script>
    <script>
        const STORAGE_CHINA = 'lv-zhu-travel-map';
        const STORAGE_WORLD = 'lv-zhu-travel-map-world';
        const STATES = ['unvisited', 'visited', 'want'];
        
        let currentMap = 'china';
        let chartInstance = null;
        let mapDataLoaded = { china: false, world: false };

        const colorMap = {
            'visited': '#4f46e5',
            'want': '#10b981',
            'unvisited': '#e2e8f0'
        };

        function loadData(key) {
            try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : {}; }
            catch { return {}; }
        }
        function saveData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

        async function initMap() {
            chartInstance = echarts.init(document.getElementById('mapChart'));
            window.addEventListener('resize', () => chartInstance.resize());
            
            chartInstance.on('click', function (params) {
                if(!params.name) return;
                const regionName = params.name;
                const storageKey = currentMap === 'china' ? STORAGE_CHINA : STORAGE_WORLD;
                const data = loadData(storageKey);
                
                const currentState = data[regionName] || 'unvisited';
                const nextState = STATES[(STATES.indexOf(currentState) + 1) % STATES.length];
                data[regionName] = nextState;
                saveData(storageKey, data);
                
                updateChartDisplay();
            });

            await switchMap('china');
        }

        async function fetchGeoJSON(type) {
            const url = type === 'china' 
                ? 'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json'
                : 'https://unpkg.com/echarts@4.9.0/map/json/world.json';
            const res = await fetch(url);
            if (!res.ok) throw new Error('Network response was not ok');
            return await res.json();
        }

        async function switchMap(type) {
            currentMap = type;
            const loadingMsg = document.getElementById('loadingMsg');
            loadingMsg.style.display = 'flex';
            
            if (!mapDataLoaded[type]) {
                try {
                    const geoJson = await fetchGeoJSON(type);
                    if (type === 'world') {
                        echarts.registerMap('world', geoJson);
                    } else {
                        echarts.registerMap('china', geoJson);
                    }
                    mapDataLoaded[type] = true;
                } catch(e) {
                    loadingMsg.innerHTML = '<i class="fas fa-exclamation-triangle" style="margin-right:8px; color:#ef4444;"></i> 地图资源加载失败，请检查网络';
                    return;
                }
            }
            
            loadingMsg.style.display = 'none';
            updateChartDisplay();
        }

        function updateChartDisplay() {
            const storageKey = currentMap === 'china' ? STORAGE_CHINA : STORAGE_WORLD;
            const savedData = loadData(storageKey);
            
            const seriesData = Object.keys(savedData).map(name => {
                const state = savedData[name];
                return {
                    name: name,
                    value: state,
                    itemStyle: {
                        areaColor: colorMap[state],
                        shadowColor: state === 'unvisited' ? 'transparent' : 'rgba(0,0,0,0.15)',
                        shadowBlur: state === 'unvisited' ? 0 : 5
                    }
                }
            });

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(255, 255, 255, 0.9)',
                    borderColor: 'rgba(79, 70, 229, 0.2)',
                    textStyle: { color: '#334155' },
                    formatter: function(params) {
                        const stateStr = { 'visited': '🎈 去过', 'want': '🎯 想去', 'unvisited': '☁️ 未去' };
                        let val = params.data && params.data.value ? params.data.value : 'unvisited';
                        if (isNaN(val)) {
                            // in case echarts returns the number for values, but ours are strings
                            // just check safety
                        }
                        return '<b>' + params.name + '</b><br/>' + stateStr[val];
                    }
                },
                series: [{
                    type: 'map',
                    map: currentMap,
                    roam: true,
                    scaleLimit: { min: 1, max: 10 },
                    itemStyle: {
                        areaColor: colorMap['unvisited'],
                        borderColor: '#ffffff',
                        borderWidth: 1.5
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#c7d2fe',
                            borderColor: '#818cf8',
                            borderWidth: 1.5
                        },
                        label: { show: true, color: '#334155', fontWeight: 'bold' }
                    },
                    select: {
                        disabled: true
                    },
                    label: {
                        show: currentMap === 'china',
                        color: '#64748b',
                        fontSize: 10
                    },
                    data: seriesData
                }]
            };
            
            chartInstance.setOption(option, true);
            
            const vals = Object.values(savedData);
            document.getElementById('visitedCount').textContent = vals.filter(v => v === 'visited').length;
            document.getElementById('wantCount').textContent = vals.filter(v => v === 'want').length;
            const totalEles = currentMap === 'china' ? 34 : 213; 
            document.getElementById('totalCount').textContent = totalEles;
        }

        document.querySelectorAll('.map-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.map-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                switchMap(e.target.dataset.map);
            });
        });

        initMap();
    </script>
</body>
</html>
