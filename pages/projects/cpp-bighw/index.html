<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../../css/common.css">
    <style>
        .download-list {
            margin-top: 1.25rem;
            display: grid;
            gap: 1rem;
        }

        .download-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            background: #fff;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            color: inherit;
        }

        .download-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
        }

        .download-item i {
            font-size: 1.75rem;
            color: #2563eb;
            width: 2rem;
            text-align: center;
        }

        .download-meta {
            min-width: 0;
            flex: 1;
        }

        .download-name {
            font-size: 1rem;
            font-weight: 700;
            color: #0f172a;
            word-break: break-all;
        }

        .download-size {
            margin-top: 0.25rem;
            font-size: 0.92rem;
            color: #475569;
        }

        .download-usage {
            margin-top: 0.2rem;
            font-size: 0.9rem;
            color: #334155;
        }

        .download-note {
            margin-top: 1rem;
            padding: 0.9rem 1rem;
            border-left: 3px solid #f59e0b;
            border-radius: 8px;
            background: #fffbeb;
            color: #78350f;
            font-size: 0.92rem;
            line-height: 1.6;
        }

        @media (max-width: 640px) {
            .download-item {
                padding: 0.9rem 1rem;
                gap: 0.75rem;
            }

            .download-name {
                font-size: 0.95rem;
            }

            .download-size {
                font-size: 0.85rem;
            }

            .download-usage {
                font-size: 0.83rem;
            }
        }
    </style>
</head>

    <nav class="navbar"></nav>
