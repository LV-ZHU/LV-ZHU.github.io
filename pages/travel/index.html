<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel | LV-ZHU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../../css/common.css">
    <script src="https://cdn.staticfile.net/echarts/5.5.0/echarts.min.js"></script>
    <style>
        .travel-container { max-width: 1100px; margin: 0 auto; background: white; border-radius: var(--radius-md); box-shadow: var(--shadow-md); padding: 2rem; }
        .map-tabs { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; }
        .map-tab { padding: 0.6rem 1.5rem; border: none; border-radius: 20px; background: var(--gray-light); color: var(--gray); font-weight: 600; cursor: pointer; transition: var(--transition-fast); }
        .map-tab.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }
        .map-legend { display: flex; gap: 2rem; margin-bottom: 1.5rem; justify-content: center; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--gray); }
        .legend-dot { width: 14px; height: 14px; border-radius: 3px; }
        .legend-dot.visited { background: #4f46e5; box-shadow: 0 0 8px rgba(79, 70, 229, 0.5); }
        .legend-dot.want { background: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
        .legend-dot.unvisited { background: #f1f5f9; border: 1px solid #cbd5e1; }
        .echarts-wrapper { background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%); border-radius: var(--radius-md); overflow: hidden; position: relative; box-shadow: inset 0 2px 10px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.7); }
        #mapChart { width: 100%; height: 650px; }
        .map-stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-light); }
        .stat-card { background: #f8fafc; border-radius: var(--radius-md); padding: 1.2rem; text-align: center; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-sm); }
        .stat-card-title { font-weight: 600; color: #475569; font-size: 1.1rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .stat-row { display: flex; justify-content: space-around; align-items: center; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .stat-num.want { color: #10b981; }
        .stat-label { font-size: 0.8rem; color: var(--gray); margin-top: 0.2rem; }
        .map-tip { text-align: center; margin-top: 2rem; font-size: 0.85rem; color: var(--gray); line-height: 1.6;}
        #loadingMsg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); color: var(--primary); font-size: 1.1rem; z-index: 10; font-weight: 600; }
        .lds-dual-ring { display: inline-block; width: 24px; height: 24px; margin-right: 12px; position: relative; }
        .lds-dual-ring:after { content: ""; display: block; position: absolute; width: 20px; height: 20px; margin: 2px; border-radius: 50%; border: 3px solid var(--primary); border-color: var(--primary) transparent var(--primary) transparent; animation: lds-dual-ring 1.2s linear infinite; }
        @keyframes lds-dual-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="navbar"></nav>

    <div class="page-wrapper">
        <div class="page-header">
            <h1><i class="fas fa-map-marked-alt"></i> Travel</h1>
        </div>
        <section class="section">
            <div class="container">
                <div class="travel-container fade-in">
                    <div class="section-header">
                        <h2 class="section-title">我的足迹</h2>
                        <p class="section-desc">点击地图行政板块可切换：未去 → 去过  → 想去 </p>
                    </div>
                    
                    <div class="map-tabs">
			<button class="map-tab" data-map="shanghai">上海足迹</button>
                        <button class="map-tab active" data-map="china">中国足迹</button>  
                        <button class="map-tab" data-map="world">全球足迹</button>
                    </div>

                    <div class="map-legend">
                        <div class="legend-item"><span class="legend-dot visited"></span> 去过</div>
                        <div class="legend-item"><span class="legend-dot want"></span> 想去</div>
                        <div class="legend-item"><span class="legend-dot unvisited"></span> 未去</div>
                    </div>

                    <div class="echarts-wrapper">
                        <div id="loadingMsg" style="display:none;"><div class="lds-dual-ring"></div> 获取在线地图中...</div>
                        <div id="mapChart"></div>
                    </div>

                    <div class="map-stats-container" id="statsContainer"></div>
                    
                    </div>
            </div>
        </section>
    </div>

    <footer class="footer"></footer>
    <script src="../../js/common.js"></script>
    <script>
        const STORAGE_CHINA = 'lv-zhu-travel-map';
        const STORAGE_WORLD = 'lv-zhu-travel-map-world';
        const STORAGE_SHANGHAI = 'lv-zhu-travel-map-shanghai';
        const STATES = ['unvisited', 'visited', 'want'];
        
        let currentMap = 'china';
        let chartInstance = null;
        
        let geoDataCache = {
            chinaCities: null,
            chinaProv: null,
            shanghai: null,
            world: null
        };

        let cityToProvMap = {};
        let provLinesData = [];

        const colorMap = {
            'visited': '#4f46e5',
            'want': '#10b981',
            'unvisited': '#f1f5f9'
        };

        function loadData(key) {
            try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : {}; }
            catch { return {}; }
        }
        function saveData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

        async function fetchExternalGeoJSON() {
            const loadingMsg = document.getElementById('loadingMsg');
            loadingMsg.innerHTML = '<div class="lds-dual-ring"></div> 正在加载数据，请稍候...';
            loadingMsg.style.display = 'flex';
            
            try {
                if (currentMap === 'china') {
                    if (!geoDataCache.chinaCities || !geoDataCache.chinaProv) {
                        const [resCities, resProv] = await Promise.all([
                            fetch('https://registry.npmmirror.com/echarts/4.9.0/files/map/json/china-cities.json'),
                            fetch('https://registry.npmmirror.com/echarts/4.9.0/files/map/json/china.json')
                        ]);
                        geoDataCache.chinaCities = await resCities.json();
                        geoDataCache.chinaProv = await resProv.json();

                        let provIdMap = {};
                        geoDataCache.chinaProv.features.forEach(f => {
                            let id = String(f.id || (f.properties && f.properties.id) || '');
                            if(id) provIdMap[id.substring(0, 2)] = f.properties.name;
                        });
                        geoDataCache.chinaCities.features.forEach(f => {
                            let id = String(f.id || (f.properties && f.properties.id) || '');
                            if(id && id.length >= 2 && provIdMap[id.substring(0, 2)]) {
                                cityToProvMap[f.properties.name] = provIdMap[id.substring(0, 2)];
                            }
                        });

                        provLinesData = [];
                        geoDataCache.chinaProv.features.forEach(f => {
                            if (!f.geometry) return;
                            let coords = f.geometry.coordinates;
                            if (f.geometry.type === 'Polygon') {
                                coords.forEach(ring => provLinesData.push({ coords: ring }));
                            } else if (f.geometry.type === 'MultiPolygon') {
                                coords.forEach(poly => poly.forEach(ring => provLinesData.push({ coords: ring })));
                            }
                        });

                        echarts.registerMap('china-cities', geoDataCache.chinaCities);
                    }
                } else if (currentMap === 'shanghai') {
                    if (!geoDataCache.shanghai) {
                        const res = await fetch('https://registry.npmmirror.com/echarts/4.9.0/files/map/json/province/shanghai.json');
                        geoDataCache.shanghai = await res.json();
                    }
                    echarts.registerMap('shanghai-map', geoDataCache.shanghai);
                } else if (currentMap === 'world') {
                    if (!geoDataCache.world) {
                        const res = await fetch('https://registry.npmmirror.com/echarts/4.9.0/files/map/json/world.json');
                        geoDataCache.world = await res.json();
                    }
                    echarts.registerMap('world', geoDataCache.world);
                }
            } catch (e) {
                loadingMsg.innerHTML = '<i class="fas fa-exclamation-triangle" style="margin-right:8px; color:#ef4444;"></i> 在线地图资源加载失败，请重试';
                console.error(e);
                return false;
            }
            loadingMsg.style.display = 'none';
            return true;
        }

        function initMap() {
            chartInstance = echarts.init(document.getElementById('mapChart'));
            window.addEventListener('resize', () => chartInstance.resize());
            
            chartInstance.on('click', function (params) {
                if(!params.name || params.seriesType === 'lines') return;

                const storageKey = currentMap === 'china' ? STORAGE_CHINA 
                    : (currentMap === 'world' ? STORAGE_WORLD : STORAGE_SHANGHAI);
                const data = loadData(storageKey);
                
                const currentState = data[params.name] || 'unvisited';
                const nextState = STATES[(STATES.indexOf(currentState) + 1) % STATES.length];
                
                if (nextState === 'unvisited') {
                    delete data[params.name];
                } else {
                    data[params.name] = nextState;
                }
                saveData(storageKey, data);
                
                updateChartDisplay();
            });

            renderStatsUI(true);
            switchMap('china');
        }

        async function switchMap(type) {
            currentMap = type;
            renderStatsUI(true);
            const success = await fetchExternalGeoJSON();
            if (success) {
                updateChartDisplay();
            }
        }

        function updateChartDisplay() {
            const storageKey = currentMap === 'china' ? STORAGE_CHINA 
                : (currentMap === 'world' ? STORAGE_WORLD : STORAGE_SHANGHAI);
            const savedData = loadData(storageKey);

            let seriesData = [];
            Object.keys(savedData).forEach(name => {
                const state = savedData[name];
                seriesData.push({
                    name: name,
                    value: state,
                    itemStyle: {
                        areaColor: colorMap[state],
                        shadowColor: 'rgba(0,0,0,0.15)',
                        shadowBlur: 3
                    }
                });
            });

            let mapName = currentMap === 'china' ? 'china-cities' : (currentMap === 'world' ? 'world' : 'shanghai-map');

            let option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    borderColor: 'rgba(79, 70, 229, 0.2)',
                    textStyle: { color: '#334155' },
                    formatter: function(params) {
                        if(params.seriesType === 'lines') return '';
                        const stateStrMap = { 'visited': '🎈 去过', 'want': '🎯 想去', 'unvisited': '☁️ 未去' };
                        let val = params.data && params.data.value ? params.data.value : 'unvisited';
                        if (isNaN(val)) {}
                        return '<b>' + params.name + '</b><br/><span style="margin-top:4px;display:inline-block;">' + stateStrMap[val] + '</span>';
                    }
                },
                geo: {
                    map: mapName,
                    roam: true,
                    scaleLimit: { min: 0.5, max: 25 },
                    itemStyle: {
                        areaColor: colorMap['unvisited'],
                        borderColor: currentMap === 'china' ? '#e2e8f0' : '#cbd5e1', 
                        borderWidth: currentMap === 'shanghai' ? 0.8 : 0.6
                    },
                    emphasis: {
                        itemStyle: { areaColor: '#c7d2fe', borderColor: '#818cf8', borderWidth: 1 }
                    }
                },
                series: [
                    {
                        name: mapName,
                        type: 'map',
                        geoIndex: 0,
                        data: seriesData
                    }
                ]
            };

            if (currentMap === 'china') {
                option.series.push({
                    name: 'province-lines',
                    type: 'lines',
                    coordinateSystem: 'geo',
                    polyline: true,
                    data: provLinesData,
                    lineStyle: { color: '#475569', width: 2, opacity: 0.8 },
                    silent: true
                });
            }

            renderStatsUI(false);
            chartInstance.setOption(option, true);
        }

        function renderStatsUI(isLoading) {
            const storageKey = currentMap === 'china' ? STORAGE_CHINA 
                : (currentMap === 'world' ? STORAGE_WORLD : STORAGE_SHANGHAI);
            const savedData = loadData(storageKey);

            if (currentMap === 'world' || currentMap === 'shanghai') {
                let visitedCount = 0, wantCount = 0;
                Object.values(savedData).forEach(st => { if(st==='visited') visitedCount++; else wantCount++; });
                
                let title = currentMap === 'world' ? '🌎 全球足迹概览' : '🏙️ 上海市区足迹';
                let labelType = currentMap === 'world' ? '国家/地区' : '行政区';
                let maxCount = isLoading ? '...' : (currentMap === 'world' ? 
                    (geoDataCache.world ? geoDataCache.world.features.length : 200) : 
                    (geoDataCache.shanghai ? geoDataCache.shanghai.features.length : 17));

                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-card-title">${title}</div>
                        <div class="stat-row">
                            <div class="stat-item"><div class="stat-num">${visitedCount}</div><div class="stat-label">去过</div></div>
                            <div class="stat-item"><div class="stat-num want">${wantCount}</div><div class="stat-label">想去</div></div>
                            <div class="stat-item"><div class="stat-num" style="color:#94a3b8">${maxCount}</div><div class="stat-label">${labelType}</div></div>
                        </div>
                    </div>`;
            } else {
                let vCity = 0, wCity = 0;
                let vProv = new Set(), wProv = new Set();
                
                Object.keys(savedData).forEach(cityName => {
                    const state = savedData[cityName];
                    let pName = cityToProvMap[cityName];
                    if (state === 'visited') {
                        vCity++;
                        if (pName) vProv.add(pName);
                    } else if (state === 'want') {
                        wCity++;
                        if (pName) wProv.add(pName);
                    }
                });

                let maxCityCount = isLoading ? '...' : (geoDataCache.chinaCities ? geoDataCache.chinaCities.features.length : 344);
                let maxProvCount = isLoading ? '...' : (geoDataCache.chinaProv ? geoDataCache.chinaProv.features.length : 34);

                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-card-title">🗺️ 中国足迹明细 - 地级市</div>
                        <div class="stat-row">
                            <div class="stat-item"><div class="stat-num">${vCity}</div><div class="stat-label">去过</div></div>
                            <div class="stat-item"><div class="stat-num want">${wCity}</div><div class="stat-label">想去</div></div>
                            <div class="stat-item"><div class="stat-num" style="color:#94a3b8">${maxCityCount}</div><div class="stat-label">地级市</div></div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-title">🗺️ 中国足迹明细 - 省市</div>
                        <div class="stat-row">
                            <div class="stat-item"><div class="stat-num">${vProv.size}</div><div class="stat-label">去过</div></div>
                            <div class="stat-item"><div class="stat-num want">${wProv.size}</div><div class="stat-label">想去</div></div>
                            <div class="stat-item"><div class="stat-num" style="color:#94a3b8">${maxProvCount}</div><div class="stat-label">省市</div></div>
                        </div>
                    </div>`;
            }
        }

        document.querySelectorAll('.map-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                if(e.target.classList.contains('active')) return;
                document.querySelectorAll('.map-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                
                if(chartInstance) { chartInstance.clear(); }
                switchMap(e.target.dataset.map);
            });
        });

        window.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
