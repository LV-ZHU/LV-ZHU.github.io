    <style>
        .music-category { margin-bottom: 2.5rem; }
        .music-category:last-child { margin-bottom: 0; }
        .music-category-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.65rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .music-category-title i { color: var(--primary); }
        .music-category-desc {
            color: var(--gray);
            font-size: 0.92rem;
            margin-bottom: 1.2rem;
        }
        .music-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            list-style: none;
        }
        .music-item {
            background: white;
            border-radius: var(--radius-md);
            padding: 1.05rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition-normal);
        }
        .music-item:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .music-main {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .music-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(79, 70, 229, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .music-icon i { color: var(--primary); font-size: 1.1rem; }
        .music-info { min-width: 0; }
        .music-name {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.95rem;
            line-height: 1.45;
        }
        .music-artist { font-size: 0.82rem; color: var(--gray); margin-top: 0.15rem; }
        .music-actions {
            margin-top: 0.8rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .music-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.78rem;
            padding: 0.28rem 0.52rem;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.08);
            background: #f8fafc;
            color: #334155;
            white-space: nowrap;
        }
        .music-link.primary {
            border-color: rgba(251, 114, 153, 0.35);
            background: #fff1f5;
            color: #be185d;
        }
        .music-summary {
            margin-top: 1rem;
            color: var(--gray);
            font-size: 0.88rem;
        }
    </style>
</head>

            function buildUrl(base, query, suffix) {
                return base + encodeURIComponent(query) + (suffix || '');
            }

            function renderSong(song, index) {
                var query = song.name + ' ' + song.artist;
                var bilibili = buildUrl('https://search.bilibili.com/all?keyword=', query);
                var netease = buildUrl('https://music.163.com/#/search/m/?s=', query, '&type=1');
                var kugou = buildUrl('https://www.kugou.com/yy/html/search.html#searchType=song&searchKeyWord=', query);
                var qq = buildUrl('https://y.qq.com/n/ryqq/search?w=', query);
                var youtube = buildUrl('https://www.youtube.com/results?search_query=', query);

                var commentHtml = song.comment ? '<div class="music-summary">' + song.comment + '</div>' : '';

                return [
                    '<li class="music-item">',
                    '  <div class="music-main">',
                    '    <div class="music-icon"><i class="fas fa-music"></i></div>',
                    '    <div class="music-info">',
                    '      <div class="music-name">' + (index + 1) + '. ' + song.name + '</div>',
                    '      <div class="music-artist">' + song.artist + '</div>',
                    '    </div>',
                    '  </div>',
                    commentHtml,
                    '  <div class="music-actions">',
                    '    <a class="music-link primary" href="' + bilibili + '" target="_blank" rel="noopener noreferrer"><i class="fab fa-bilibili"></i>B站</a>',
                    '    <a class="music-link" style="border-color: rgba(230, 0, 38, 0.2); background: #fdf2f4; color: #b03040;" href="' + netease + '" target="_blank" rel="noopener noreferrer"><i class="fas fa-music"></i>网易云</a>',
                    '    <a class="music-link" style="border-color: rgba(0, 169, 255, 0.2); background: #eff8ff; color: #1070d0;" href="' + kugou + '" target="_blank" rel="noopener noreferrer"><i class="fas fa-headphones"></i>酷狗</a>',
                    '    <a class="music-link" style="border-color: rgba(30, 200, 100, 0.2); background: #f0fdf4; color: #108040;" href="' + qq + '" target="_blank" rel="noopener noreferrer"><i class="fas fa-music"></i>QQ</a>',
                    '    <a class="music-link" style="border-color: rgba(255, 0, 0, 0.2); background: #fff1f1; color: #c02020;" href="' + youtube + '" target="_blank" rel="noopener noreferrer"><i class="fab fa-youtube"></i>Youtube</a>',
                    '  </div>',
                    '</li>'
                ].join('');
            }

            function renderList(listId, summaryId, songsData) {
                var listNode = document.getElementById(listId);
                var summaryNode = document.getElementById(summaryId);
                if(listNode && summaryNode) {
                    listNode.innerHTML = songsData.map(renderSong).join('');
                    summaryNode.textContent = '共 ' + songsData.length + ' 首。';
                }
            }
