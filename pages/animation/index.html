    <style>
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .anime-card {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition-normal);
        }
        .anime-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }
        .anime-poster {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.5);
            font-size: 3rem;
            overflow: hidden;
        }
        .anime-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .anime-info {
            padding: 1.2rem;
        }
        .anime-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--dark);
            margin-bottom: 0.3rem;
        }
        .anime-meta {
            font-size: 0.82rem;
            color: var(--gray);
        }
        .anime-rating {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            color: #f59e0b;
            font-weight: 600;
            font-size: 0.88rem;
            margin-top: 0.4rem;
        }
    </style>
