    <style>
        .map-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            padding: 2rem;
        }
        .map-legend {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--gray);
        }
        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }
        .legend-dot.visited {
            background: var(--primary);
        }
        .legend-dot.unvisited {
            background: var(--gray-light);
        }
        .legend-dot.want {
            background: var(--secondary);
        }
        .china-map {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 0.6rem;
        }
        .province {
            padding: 0.7rem 0.5rem;
            border-radius: var(--radius-sm);
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
            border: 2px solid transparent;
            user-select: none;
        }
        .province.unvisited {
            background: var(--gray-light);
            color: var(--gray);
        }
        .province.visited {
            background: rgba(79, 70, 229, 0.15);
            color: var(--primary);
            border-color: var(--primary);
        }
        .province.want {
            background: rgba(16, 185, 129, 0.12);
            color: var(--secondary);
            border-color: var(--secondary);
        }
        .province:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-sm);
        }
        .province i {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 0.2rem;
        }
        .map-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-light);
        }
        .stat-item {
            text-align: center;
        }
        .stat-num {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--gray);
            margin-top: 0.2rem;
        }
        .map-tip {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--gray);
        }
    </style>

    <script>
        // �й� 34 ��ʡ��������
        const provinces = [
            '����','���','�Ϻ�','����',
            '�ӱ�','ɽ��','����','����','������',
            '����','�㽭','����','����','����','ɽ��',
            '����','����','����','�㶫','����',
            '�Ĵ�','����','����','����','����',
            '�ຣ','���ɹ�','����','����','����','�½�',
            '���','����','̨��'
        ];

        const states = ['unvisited', 'visited', 'want'];
        const STORAGE_KEY = 'lv-zhu-travel-map';

        // �� localStorage ��ȡ
        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch { return {}; }
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function render() {
            const map = document.getElementById('chinaMap');
            const data = loadData();
            map.innerHTML = '';

            provinces.forEach(name => {
                const state = data[name] || 'unvisited';
                const el = document.createElement('div');
                el.className = 'province ' + state;
                el.textContent = name;
                el.addEventListener('click', () => {
                    const currentIdx = states.indexOf(data[name] || 'unvisited');
                    data[name] = states[(currentIdx + 1) % states.length];
                    saveData(data);
                    render();
                });
                map.appendChild(el);
            });

            // ͳ��
            const vals = Object.values(data);
            document.getElementById('visitedCount').textContent = vals.filter(v => v === 'visited').length;
            document.getElementById('wantCount').textContent = vals.filter(v => v === 'want').length;
        }

        render();
    </script>
